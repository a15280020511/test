name: Cleanup
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 0"
jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install -U pip
          pip install -e .
      - name: Run cleanup
        run: python -m hebc_lite.cleanup
      - name: Commit cleanup
        run: |
          git config user.name "hebc-lite-bot"
          git config user.email "hebc-lite-bot@users.noreply.github.com"
          git add reports artifacts jobs tasks || true
          git commit -m "chore: cleanup HEBC Lite outputs" || echo "No changes"
          git push || true
