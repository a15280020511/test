name: Health Check
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"
jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install -U pip
          pip install -e .
      - name: Run health check
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python -m hebc_lite.health_check
      - name: Commit health report
        run: |
          git config user.name "hebc-lite-bot"
          git config user.email "hebc-lite-bot@users.noreply.github.com"
          git add reports artifacts jobs || true
          git commit -m "chore: update HEBC Lite health report" || echo "No changes"
          git push || true
