name: HEBC Lite Run Task
on:
  workflow_dispatch:
    inputs:
      task_file:
        description: "Path to task JSON"
        required: true
        default: "tasks/inbox/example_task.json"
  pull_request:
    paths:
      - "tasks/inbox/*.json"
      - "configs/models.json"
      - "hebc_lite/**"
      - ".github/workflows/run_task.yml"
  push:
    paths:
      - "tasks/inbox/*.json"
jobs:
  run-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install -U pip
          pip install -e .
      - name: Run task
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          TASK_FILE="${{ github.event.inputs.task_file }}"
          if [ -z "$TASK_FILE" ]; then
            TASK_FILE=$(find tasks/inbox -maxdepth 1 -name "*.json" -type f | sort | tail -n 1)
          fi
          if [ -z "$TASK_FILE" ] || [ ! -f "$TASK_FILE" ]; then
            echo "No task JSON found under tasks/inbox; nothing to run."
            exit 0
          fi
          python -m hebc_lite.run_task --task "$TASK_FILE"
      - name: Commit outputs
        run: |
          git config user.name "hebc-lite-bot"
          git config user.email "hebc-lite-bot@users.noreply.github.com"
          git add jobs reports artifacts tasks || true
          git commit -m "chore: update HEBC Lite task outputs" || echo "No changes"
          git push || true
