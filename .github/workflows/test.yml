name: Test
on:
  workflow_dispatch:
  pull_request:
  push:
    paths:
      - "hebc_lite/**"
      - "tests/**"
      - "configs/**"
      - "pyproject.toml"
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test package
        run: |
          python -m pip install -U pip
          pip install -e . --no-deps
          pip install pydantic pytest
      - name: Run tests
        run: pytest -q
