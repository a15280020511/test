name: Test
on:
  workflow_dispatch:
  push:
    paths:
      - "hebc_lite/**"
      - "tests/**"
      - "configs/**"
      - "pyproject.toml"
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install -U pip
          pip install -e .
          pip install pytest
      - name: Run tests
        run: pytest -q
